<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Cross-account EKS provisioning trust diagram</title>
<desc>Management account assumes a role in the customer's AWS account via sts:AssumeRole with an external ID, then provisions a VPC, EKS cluster, and OIDC provider inside that account.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="480" fill="#ffffff"/>

<rect x="40" y="40" width="240" height="400" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="60" y="65" font-family="sans-serif" font-size="14" font-weight="600" fill="#042C53">Your management account</text>

<rect x="360" y="40" width="260" height="400" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="380" y="65" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">Customer's AWS account</text>

<rect x="60" y="220" width="200" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
<text x="160" y="243" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#042C53">Terraform / CI runner</text>
<text x="160" y="261" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0C447C">holds no customer credentials</text>

<rect x="380" y="90" width="220" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text x="490" y="113" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">PlatformProvisionerRole</text>
<text x="490" y="131" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">trust: mgmt account + external ID</text>

<rect x="380" y="190" width="220" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text x="490" y="213" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">VPC + EKS cluster</text>
<text x="490" y="231" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">private subnets, managed node groups</text>

<rect x="380" y="290" width="220" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text x="490" y="313" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#04342C">OIDC provider</text>
<text x="490" y="331" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#085041">enables IRSA for pods</text>

<path d="M260 240 L320 240 L320 118 L378 118" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<text x="323" y="180" font-family="sans-serif" font-size="12" fill="#3d3d3a">sts:AssumeRole</text>
<text x="323" y="195" font-family="sans-serif" font-size="12" fill="#3d3d3a">+ external ID</text>

<line x1="490" y1="146" x2="490" y2="188" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="490" y1="246" x2="490" y2="288" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>
</svg>
