name: Terraform Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: fmt / init / validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - modules/customer-account-role
          - modules/eks-cluster
          - examples/customer-role-setup
          - examples/full-deployment
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: terraform fmt -check
        working-directory: ${{ matrix.module }}
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.module }}
        run: terraform validate

  security-scan:
    name: trivy (IaC scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to a commit SHA, not a tag. aquasecurity/trivy-action had 76 of
      # its 77 release tags retroactively repointed to a malicious commit in
      # a 2026 supply-chain attack (tags are mutable; a repointed tag looks
      # identical in workflow logs). This SHA corresponds to the confirmed-
      # clean v0.35.0 release. Verify against
      # https://github.com/aquasecurity/trivy-action/releases before bumping.
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "config"
          scan-ref: "."
          exit-code: "0" # don't fail the build - report only, for now
          format: "table"